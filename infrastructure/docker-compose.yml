# infrastructure/docker-compose.yml
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: success-platform-db
    environment:
      POSTGRES_USER: ${DB_USER:-success_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_please}
      POSTGRES_DB: success_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-success_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - success-network

  # Redis for caching & sessions
  redis:
    image: redis:7-alpine
    container_name: success-platform-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - success-network

  # Backend (NestJS)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: success-platform-backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-success_user}:${DB_PASSWORD:-change_me_please}@postgres:5432/success_platform?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your_refresh_secret_here}
      - AI_SERVICE_URL=http://ai-service:8000
      - PAYTABS_API_KEY=${PAYTABS_API_KEY}
      - PAYTABS_PROFILE_ID=${PAYTABS_PROFILE_ID}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - success-network
    restart: unless-stopped

  # AI Service (Python FastAPI)
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: success-platform-ai
    environment:
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://localhost:3000,https://success-platform.iq
      # - OPENAI_API_KEY=${OPENAI_API_KEY}  # Optional: for LLM
    ports:
      - "8000:8000"
    volumes:
      - ../ai-service/app:/app/app  # Hot reload for development
    networks:
      - success-network
    restart: unless-stopped

  # Frontend (Next.js) - for development only
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: success-platform-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
    ports:
      - "3001:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - success-network
    profiles:
      - dev  # Only start with: docker-compose --profile dev up

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: success-platform-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - ai-service
    networks:
      - success-network
    profiles:
      - prod
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  success-network:
    driver: bridge