# ============================================================
# deployment/docker-compose.yml
# تشغيل المشروع كاملاً بأمر واحد: docker-compose up -d
# ============================================================
version: '3.9'

services:
  # ── Backend API ──
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: najah-backend
    restart:     unless-stopped
    ports:
      - "3001:3001"
    env_file:    ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - najah-net
    healthcheck:
      test:        ["CMD","wget","-qO-","http://localhost:3001/health"]
      interval:    30s
      timeout:     10s
      start_period: 20s
      retries:     3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend ──
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: najah-frontend
    restart:     unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.najah-platform.iq
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    networks:
      - najah-net

  # ── Redis Cache ──
  redis:
    image:         redis:7-alpine
    container_name: najah-redis
    restart:       unless-stopped
    command:       redis-server --requirepass ${REDIS_PASSWORD:-najah2025} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - najah-net
    healthcheck:
      test:     ["CMD","redis-cli","ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Nginx Reverse Proxy ──
  nginx:
    image:         nginx:alpine
    container_name: najah-nginx
    restart:       unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - najah-net

volumes:
  redis-data:
  nginx-logs:

networks:
  najah-net:
    driver: bridge
