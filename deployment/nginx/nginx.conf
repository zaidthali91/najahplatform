# deployment/nginx/nginx.conf
# ============================================================
# Nginx — منصة النجاح
# يعمل كـ Reverse Proxy + SSL Termination + Rate Limiting
# ============================================================

worker_processes  auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ──
  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 25M;  # للسماح برفع PDF 20MB+

  # ── Gzip ──
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types        text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;

  # ── Rate Limiting ──
  limit_req_zone  $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone  $binary_remote_addr zone=ai:10m  rate=2r/s;
  limit_req_zone  $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstream backends ──
  upstream backend {
    server backend:3001;
    keepalive 32;
  }
  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # ── Security headers ──
  add_header X-Frame-Options        "DENY"                     always;
  add_header X-Content-Type-Options "nosniff"                  always;
  add_header X-XSS-Protection       "1; mode=block"            always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy     "geolocation=(), microphone=()" always;

  # ── HTTP → HTTPS redirect ──
  server {
    listen 80;
    server_name najah-platform.iq www.najah-platform.iq api.najah-platform.iq;
    return 301 https://$host$request_uri;
  }

  # ── Main site (HTTPS) ──
  server {
    listen 443 ssl http2;
    server_name najah-platform.iq www.najah-platform.iq;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://api.anthropic.com https://*.supabase.co;" always;

    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Next.js static assets
      location /_next/static/ {
        proxy_pass   http://frontend;
        expires      1y;
        add_header   Cache-Control "public, immutable";
      }
    }
  }

  # ── API (HTTPS) ──
  server {
    listen 443 ssl http2;
    server_name api.najah-platform.iq;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── General API ──
    location /api/ {
      limit_req zone=api burst=40 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 90s;
      proxy_send_timeout 90s;
    }

    # ── AI endpoints (stricter limit) ──
    location ~ ^/api/(tutor|pdf/analyze) {
      limit_req zone=ai burst=5 nodelay;
      proxy_pass         http://backend;
      proxy_read_timeout 120s;  # الذكاء الاصطناعي يحتاج وقتاً أطول
      proxy_set_header   Host $host;
    }

    # ── Auth (صارم جداً) ──
    location ~ ^/api/auth/(login|register) {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
    }

    # ── Health check (بدون rate limit) ──
    location /health {
      proxy_pass http://backend;
      access_log off;
    }

    # ── Stripe webhook (بدون rate limit — Stripe IP فقط) ──
    location /api/payments/stripe-webhook {
      allow 3.18.12.63;
      allow 3.130.192.231;
      allow 13.235.14.237;
      deny  all;
      proxy_pass http://backend;
    }
  }
}
